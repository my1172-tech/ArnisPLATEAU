<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>ArnisPLATEAU 範囲選択</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet-draw@1.0.4/dist/leaflet.draw.js"></script>
<link rel="stylesheet" href="https://unpkg.com/leaflet-draw@1.0.4/dist/leaflet.draw.css" />
<style>
  html, body, #map { height: 100%; margin: 0; padding: 0; }
  #toolbar {
    position: absolute; top: 10px; left: 50px; z-index: 1000;
    background: white; padding: 10px 14px; border-radius: 6px;
    box-shadow: 0 2px 6px rgba(0,0,0,0.3); font-family: sans-serif; font-size: 13px;
  }
  #confirm-btn {
    position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
    z-index: 1000; background: #166534; color: white; border: none;
    padding: 12px 28px; border-radius: 6px; font-size: 15px; font-weight: bold;
    cursor: pointer; box-shadow: 0 2px 8px rgba(0,0,0,0.3);
  }
  #confirm-btn:disabled { background: #9CA3AF; cursor: not-allowed; }
  #spawn-marker-icon { background: #DC2626; }
</style>
</head>
<body>
<div id="map"></div>
<div id="toolbar">
  ① 矩形ツールで範囲を選択<br>
  ② 「スポーン地点指定」を押して地図をクリック<br>
  ③ 下の確定ボタンを押す
</div>
<button id="confirm-btn" disabled>選択範囲を確定してアプリに戻る</button>

<script>
const map = L.map('map').setView([35.6678, 139.7506], 16); // デフォルト: 虎ノ門
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '&copy; OpenStreetMap contributors'
}).addTo(map);

const drawnItems = new L.FeatureGroup();
map.addLayer(drawnItems);

const drawControl = new L.Control.Draw({
  draw: {
    polygon: false, polyline: false, circle: false, marker: false, circlemarker: false,
    rectangle: { shapeOptions: { color: '#2563AE' } }
  },
  edit: { featureGroup: drawnItems, remove: true }
});
map.addControl(drawControl);

let currentBBox = null;
let spawnMode = false;
let spawnMarker = null;
let spawnLatLng = null;

map.on(L.Draw.Event.CREATED, function (e) {
  drawnItems.clearLayers();
  drawnItems.addLayer(e.layer);
  const bounds = e.layer.getBounds();
  currentBBox = {
    min_lat: bounds.getSouth(),
    max_lat: bounds.getNorth(),
    min_lon: bounds.getWest(),
    max_lon: bounds.getEast()
  };
  updateConfirmState();
});

// スポーン地点指定ボタン（ツールバーに追加）
const spawnBtn = document.createElement('button');
spawnBtn.innerText = 'スポーン地点指定';
spawnBtn.style.marginTop = '8px';
spawnBtn.style.padding = '6px 10px';
spawnBtn.onclick = () => { spawnMode = true; spawnBtn.innerText = '地図をクリックしてください'; };
document.getElementById('toolbar').appendChild(document.createElement('br'));
document.getElementById('toolbar').appendChild(spawnBtn);

map.on('click', function(e) {
  if (!spawnMode) return;
  spawnMode = false;
  spawnBtn.innerText = 'スポーン地点指定';
  spawnLatLng = e.latlng;
  if (spawnMarker) map.removeLayer(spawnMarker);
  spawnMarker = L.marker(e.latlng, {
    title: 'スポーン地点'
  }).addTo(map).bindPopup('スポーン地点').openPopup();
  updateConfirmState();
});

function updateConfirmState() {
  document.getElementById('confirm-btn').disabled = !currentBBox;
}

document.getElementById('confirm-btn').addEventListener('click', function() {
  if (!currentBBox) return;
  const result = {
    bbox: currentBBox,
    spawn: spawnLatLng ? { lat: spawnLatLng.lat, lon: spawnLatLng.lng } : null
  };
  // pywebview経由でPython側に結果を返す
  if (window.pywebview) {
    window.pywebview.api.on_area_confirmed(JSON.stringify(result));
  }
});
</script>
</body>
</html>
